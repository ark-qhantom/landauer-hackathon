# Landauer runtime constitution — Nous × NVIDIA hackathon demo.
#
# This is the human-readable policy autonomous agents run under. Landauer loads it and gates every
# proposed action against these rules BEFORE the action executes, then writes an auditable receipt.
#
#   Humans set the rules (this file). Agents do the work. Landauer leaves the receipt.

agent_id: hermes-demo-agent
policy_version: landauer-demo-v1

# Treasury the agents draw on (Stripe-backed, test mode).
treasury:
  currency: usd
  budget_usd: 500.00

# Hard resource caps, enforced per action — the numbers a company would actually set.
limits:
  max_usd_per_task: 500.00       # dollars  — economic limit  (Stripe-backed)
  max_joules_per_task: 1000      # joules   — physical limit  (NVIDIA-backed, ∫P·dt)
  max_runtime_seconds: 30        # seconds  — wall-clock limit

# A human may approve an action, but approval does NOT lift a hard cap unless the constitution grants
# override for that resource. This is "the cap is enforced below the human."
approvals:
  human_required: true
  human_can_override_usd: false
  human_can_override_joules: false

# Credential scopes the agents are permitted to use. An action needing a scope outside this set is denied.
credentials:
  allowed_scopes:
    - stripe:test_payment_intents:create
    - nvidia:telemetry:read
    - hermes:proposal:request

# What the agents may attempt. `requires_human_review: true` routes the action to a human (ESCALATE).
actions:
  summarize_docs: {allowed: true, requires_human_review: false}
  call_api_model: {allowed: true, requires_human_review: false}
  run_local_model: {allowed: true, requires_human_review: false}
  large_gpu_job: {allowed: true, requires_human_review: false}
  public_post: {allowed: true, requires_human_review: true}     # public/irreversible — always to a human
  export_customer_data:
    allowed: true
    requires_human_review: false
    required_credential_scope: customer_db:pii:export    # NOT in allowed_scopes above -> the gate denies it
